<!DOCTYPE html>
<html>
<head>
<title>MPTT - Visitor Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* General styling */
body { 
    font-family: Arial; 
    background:#f4f4f4; 
    text-align:center; 
    margin:0; 
    padding:0; 
}
.container {
    margin:30px auto;
    background:white;
    padding:30px;
    width:500px;
    max-width:95%;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

/* Logo */
.logo {
    max-width:180px;
    margin-bottom:20px;
}

/* Input fields */
input {
    width:95%;
    padding:12px;
    margin:6px 0;
    font-size:16px;
    border-radius:6px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

/* Buttons */
button { 
    width:95%; 
    padding:14px; 
    margin-top:8px; 
    cursor:pointer; 
    border-radius:6px; 
    border:none; 
    font-size:18px;
}

/* Button colors */
.signin { background:#1f3c88; color:white; }
.signout { background:#888; color:white; }
.dashboard { background:#2e8b57; color:white; }

/* Messages */
#message { margin:10px 0; color:green; font-weight:bold; }

/* Dashboard styling */
.stats { margin-top:20px; text-align:left; }
table { width:100%; border-collapse:collapse; margin-top:15px; font-size:14px; }
th, td { border:1px solid #ddd; padding:6px; text-align:left; }
th { background:#1f3c88; color:white; }

/* Currently In Building list */
.current-box { margin-top:25px; text-align:left; }
ul { padding-left:20px; }

/* Mobile responsiveness */
@media screen and (max-width:600px) {
    .container {
        width:100%;
        margin:0;
        border-radius:0;
        padding:20px;
    }
    input, button {
        font-size:20px;
        padding:16px;
    }
    table { font-size:12px; }
}
</style>
</head>
<body>

<div class="container">

<img src="logo.png" class="logo">

<h2>MPTT Visitor Management</h2>

<input type="text" id="name" placeholder="Full Name *">
<input type="text" id="telephone" placeholder="Telephone Number *">
<input type="text" id="company" placeholder="Company">
<input type="text" id="vehicle" placeholder="Vehicle Registration">
<input type="text" id="person" placeholder="Reason For Visit *">

<button class="signin" onclick="signIn()">Sign In</button>
<button class="signout" onclick="signOut()">Sign Out</button>
<button class="dashboard" onclick="toggleDashboard()">View Dashboard</button>

<p id="message"></p>

<div id="dashboardView" style="display:none">

<div class="stats">
<h3>Dashboard</h3>
<p><strong>Currently In Building:</strong> <span id="currentCount">0</span></p>
<p><strong>Total Visitors Today:</strong> <span id="todayCount">0</span></p>
<p><strong>Average Visit Duration (mins):</strong> <span id="avgDuration">0</span></p>
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Company</th>
<th>Time In</th>
<th>Time Out</th>
<th>Duration</th>
</tr>
</thead>
<tbody id="visitorTable"></tbody>
</table>

</div>

</div>

<script>
const scriptURL = "PASTE_YOUR_WEB_APP_URL_HERE";

async function signIn() {
    const name = document.getElementById("name").value.trim();
    const telephone = document.getElementById("telephone").value.trim();
    const company = document.getElementById("company").value.trim();
    const vehicle = document.getElementById("vehicle").value.trim();
    const reason = document.getElementById("person").value.trim();

    if(!name || !telephone || !reason){ alert("Please complete required fields."); return; }

    await fetch(scriptURL, {
        method:"POST",
        body: JSON.stringify({ action:"signIn", name, telephone, company, vehicle, reason })
    });

    document.getElementById("message").innerText="Signed in successfully!";
    clearFields();
    loadDashboard();
}

async function signOut() {
    const name = document.getElementById("name").value.trim();
    if(!name){ alert("Enter your full name."); return; }

    await fetch(scriptURL, {
        method:"POST",
        body: JSON.stringify({ action:"signOut", name })
    });

    document.getElementById("message").innerText="Signed out successfully!";
    clearFields();
    loadDashboard();
}

function clearFields(){ document.querySelectorAll("input").forEach(i=>i.value=""); }

function toggleDashboard(){
    const dash=document.getElementById("dashboardView");
    dash.style.display = dash.style.display==="none" ? "block":"none";
    loadDashboard();
}

async function loadDashboard(){
    const response=await fetch(scriptURL);
    const data=await response.json();

    const today=new Date().toDateString();
    let current=0, todayTotal=0, durationSum=0, durationCount=0;
    const table=document.getElementById("visitorTable");
    table.innerHTML="";

    data.forEach(v=>{
        const timeIn = v.timeIn ? new Date(v.timeIn) : null;
        const timeOut = v.timeOut ? new Date(v.timeOut) : null;

        if(timeIn && timeIn.toDateString()===today) todayTotal++;
        if(!timeOut) current++;

        if(v.duration){ durationSum+=Number(v.duration); durationCount++; }

        const row=`<tr>
            <td>${v.name}</td>
            <td>${v.company || ""}</td>
            <td>${timeIn ? timeIn.toLocaleString() : ""}</td>
            <td>${timeOut ? timeOut.toLocaleString() : ""}</td>
            <td>${v.duration || ""}</td>
        </tr>`;
        table.innerHTML+=row;
    });

    document.getElementById("currentCount").innerText=current;
    document.getElementById("todayCount").innerText=todayTotal;
    document.getElementById("avgDuration").innerText=durationCount ? Math.round(durationSum/durationCount) : 0;
}

window.onload=function(){
    loadDashboard();
    setInterval(loadDashboard,30000);
};
</script>

</body>
</html>
