<!DOCTYPE html>
<html>
<head>
<title>MPTT - Visitor Management</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin:0;
padding:20px;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
box-sizing:border-box;
overflow:hidden;
}

.container{
margin:0 auto;
background:white;
padding:30px;
width:500px;
max-width:95%;
max-height:calc(100vh - 40px);
overflow-y:auto;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.logo{
max-width:180px;
margin-bottom:20px;
}

h2,h3{
margin:5px 0;
color:#1f3c88;
}

input,select{
width:95%;
padding:12px;
margin:6px 0;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
width:95%;
padding:14px;
margin-top:10px;
font-size:18px;
border:none;
border-radius:6px;
cursor:pointer;
}

.signin{background:#1f3c88;color:white;}
.signout{background:#888;color:white;}

button:disabled{
background:#ccc;
cursor:not-allowed;
}

.success{
color:green;
margin-top:10px;
font-weight:bold;
min-height:20px;
}

.current-box{
margin-top:25px;
}

.current-box ul{
list-style:none;
padding:0;
}

.modal{
display:none;
position:fixed;
z-index:1000;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

.modal-content{
background:white;
margin:15% auto;
padding:25px;
border-radius:12px;
width:80%;
max-width:400px;
text-align:center;
}

.close-btn{
background:#1f3c88;
color:white;
padding:10px 20px;
margin-top:15px;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="loading" style="margin-top:120px;font-size:20px;">
Checking location...
</div>

<div class="container" id="app" style="display:none;">

<img src="logo.png" class="logo">

<h2>Welcome To MPTT</h2>
<h3>Please Sign In / Out</h3>

<div id="mainMenu">
<button class="signin" onclick="showSignInForm()">Sign In</button>
<button class="signout" onclick="showSignOutForm()">Sign Out</button>
</div>

<div id="signInForm" style="display:none;">
<input type="text" id="name" placeholder="Full Name *">
<input type="text" id="telephone" placeholder="Telephone Number *">
<input type="text" id="company" placeholder="Company *">
<input type="text" id="vehicle" placeholder="Vehicle Registration *">
<input type="text" id="person" placeholder="Reason For Visit *">

<button class="signin" onclick="signIn()">Confirm Sign In</button>
<button class="signout" onclick="backToMenu()">Back</button>
</div>

<div id="signOutForm" style="display:none;">

<div id="tabletSignOutBox" style="display:none;">
<h3>Select Your Name</h3>
<select id="signedInDropdown">
<option value="">Loading...</option>
</select>
<button class="signout" onclick="signOutSelectedVisitor()">Confirm Sign Out</button>
</div>

<div id="manualSignOutBox" style="display:none;">
<input type="text" id="manualSignOutName" placeholder="Full Name *">
<button class="signout" onclick="manualSignOut()">Confirm Sign Out</button>
</div>

<button class="signout" onclick="backToMenu()">Back</button>
</div>

<p class="success" id="message"></p>

<button id="tabletSetupBtn" onclick="setupTablet()" style="display:none;">
Set This Device As Tablet
</button>

</div>

<div id="popupModal" class="modal">
<div class="modal-content">

<p id="classroomMessage">Welcome to MPTT. Please head to your classroom.</p>

<button class="close-btn" onclick="closeModal()">OK</button>

</div>
</div>

<script>

/* -----------------------
GEOFENCE
----------------------- */

const businessLat=52.6462;
const businessLon=-1.9435;
const maxDistance=50;

let insideGeofence=false;

function getDistance(lat1,lon1,lat2,lon2){

const R=6371000;
const toRad=deg=>deg*Math.PI/180;

const dLat=toRad(lat2-lat1);
const dLon=toRad(lon2-lon1);

const a=
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(toRad(lat1))*
Math.cos(toRad(lat2))*
Math.sin(dLon/2)*Math.sin(dLon/2);

const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}

function checkGeofence(){

navigator.geolocation.getCurrentPosition(position=>{

const userLat=position.coords.latitude;
const userLon=position.coords.longitude;

const distance=getDistance(userLat,userLon,businessLat,businessLon);

if(distance<=maxDistance){

insideGeofence=true;

document.getElementById("loading").style.display="none";
document.getElementById("app").style.display="block";

startApp();

}else{

document.body.innerHTML="<h1 style='margin-top:120px'>Access Restricted</h1><p>You must be within 50 metres of the training centre.</p>";

}

});

}

/* -----------------------
APP
----------------------- */

const scriptURL="https://script.google.com/macros/s/AKfycbyCdTJ0E5uV_HwJ2fYmXugDrrQ50dd2_7WcY_OqtsxCJGFmFghKqW7mtw32jSSheXA/exec";

const tabletPIN="1964";
const trustedTabletKey="MPTT_TRUSTED_TABLET";

function isTrustedTablet(){
return localStorage.getItem(trustedTabletKey)==="yes";
}

function setupTablet(){

const pin=prompt("Enter admin PIN");

if(pin===tabletPIN){

localStorage.setItem(trustedTabletKey,"yes");
alert("This device is now set as the trusted tablet.");
location.reload();

}else{

alert("Incorrect PIN.");

}

}

let buttonsLocked=false;
let inactivityTimer;

function resetInactivityTimer(){

clearTimeout(inactivityTimer);

inactivityTimer=setTimeout(function(){

clearFields();
document.getElementById("message").innerText="";
backToMenu();

},15000);

}

function startApp(){

let tapCount=0;

document.querySelector("h2").addEventListener("click",function(){

tapCount++;

if(tapCount>=5){

document.getElementById("tabletSetupBtn").style.display="block";

}

});

document.addEventListener("touchstart",resetInactivityTimer);
document.addEventListener("click",resetInactivityTimer);
document.addEventListener("keydown",resetInactivityTimer);

resetInactivityTimer();

}

function lockButtons(){

document.querySelectorAll("button").forEach(btn=>btn.disabled=true);
buttonsLocked=true;

}

function unlockButtons(){

document.querySelectorAll("button").forEach(btn=>btn.disabled=false);
buttonsLocked=false;

}

function showMessage(text){

const msg=document.getElementById("message");

msg.innerText=text;

setTimeout(function(){
msg.innerText="";
},10000);

}

function showSignInForm(){

document.getElementById("mainMenu").style.display="none";
document.getElementById("signInForm").style.display="block";
document.getElementById("signOutForm").style.display="none";

}

function showSignOutForm(){

document.getElementById("mainMenu").style.display="none";
document.getElementById("signInForm").style.display="none";
document.getElementById("signOutForm").style.display="block";

if(isTrustedTablet()){

document.getElementById("tabletSignOutBox").style.display="block";
document.getElementById("manualSignOutBox").style.display="none";
loadCurrentVisitors();

}else{

document.getElementById("tabletSignOutBox").style.display="none";
document.getElementById("manualSignOutBox").style.display="block";

}

}

function backToMenu(){

document.getElementById("mainMenu").style.display="block";
document.getElementById("signInForm").style.display="none";
document.getElementById("signOutForm").style.display="none";

}

/* SIGN IN */

async function signIn(){

if(!insideGeofence){
alert("You must be within the building to sign in.");
return;
}

if(buttonsLocked) return;

lockButtons();

const name=document.getElementById("name").value.trim();
const telephone=document.getElementById("telephone").value.trim();
const company=document.getElementById("company").value.trim();
const vehicle=document.getElementById("vehicle").value.trim();
const reason=document.getElementById("person").value.trim();

if(!name||!telephone||!reason){

alert("Please complete required fields.");
unlockButtons();
return;

}

try{

const response=await fetch(scriptURL,{
method:"POST",
body:JSON.stringify({action:"signIn",name,telephone,company,vehicle,reason})
});

const result=await response.text();

if(result==="ALREADY_SIGNED_IN"){

alert("You are already signed in. Please sign out first.");
unlockButtons();
return;

}

showMessage("Signed in successfully!");

clearFields();
backToMenu();
showModal();

}catch(error){

alert("Error signing in.");

}finally{

unlockButtons();

}

}

/* SIGN OUT */

async function manualSignOut(){

if(!insideGeofence){
alert("You must be within the building to sign out.");
return;
}

if(buttonsLocked) return;

lockButtons();

const name=document.getElementById("manualSignOutName").value.trim();

if(!name){

alert("Enter your full name.");
unlockButtons();
return;

}

await fetch(scriptURL,{
method:"POST",
body:JSON.stringify({action:"signOut",name})
});

showMessage("Signed out successfully!");

clearFields();
backToMenu();

unlockButtons();

}

async function signOutSelectedVisitor(){

const dropdown=document.getElementById("signedInDropdown");
const name=dropdown.value;

if(!name){

alert("Please select your name.");
return;

}

await signOutByName(name);

}

async function signOutByName(name){

if(!insideGeofence){
alert("You must be within the building to sign out.");
return;
}

if(!isTrustedTablet()){
alert("This feature is only available on the workplace tablet.");
return;
}

if(buttonsLocked) return;

if(!confirm("Sign out "+name+"?")) return;

lockButtons();

await fetch(scriptURL,{
method:"POST",
body:JSON.stringify({action:"signOut",name})
});

showMessage(name+" signed out successfully!");
clearFields();
backToMenu();

unlockButtons();

}

async function loadCurrentVisitors(){

if(!isTrustedTablet()) return;

try{

const response=await fetch(scriptURL);
const data=await response.json();

const dropdown=document.getElementById("signedInDropdown");

dropdown.innerHTML="";

const defaultOption=document.createElement("option");
defaultOption.value="";
defaultOption.textContent="Please select your name";
dropdown.appendChild(defaultOption);

if(data.length===0){

const option=document.createElement("option");
option.value="";
option.textContent="No visitors currently signed in";
dropdown.appendChild(option);
return;

}

data.forEach(visitor=>{

const option=document.createElement("option");
option.value=visitor;
option.textContent=visitor;
dropdown.appendChild(option);

});

}catch(error){

console.log("Error loading visitors");

}

}

function clearFields(){
document.querySelectorAll("input").forEach(i=>i.value="");
document.getElementById("signedInDropdown").innerHTML="<option value=''>Please select your name</option>";
}

function showModal(){
document.getElementById("popupModal").style.display="block";
}

function closeModal(){
document.getElementById("popupModal").style.display="none";
}

window.onclick=function(event){

const modal=document.getElementById("popupModal");

if(event.target==modal) modal.style.display="none";

}

window.onload=checkGeofence;

</script>

</body>
</html>
