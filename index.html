<script>

// ======================
// GEOFENCE SETTINGS
// ======================

const businessLat = 52.6462;
const businessLon = -1.9435;
const maxDistance = 50; // meters

let insideGeofence = false;

function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const toRad = deg => deg * Math.PI / 180;

    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);

    const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(toRad(lat1)) *
        Math.cos(toRad(lat2)) *
        Math.sin(dLon/2) *
        Math.sin(dLon/2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

    return R * c;
}

function checkGeofence() {

    if (!navigator.geolocation) {
        document.body.innerHTML = "<h1>Location services required</h1>";
        return;
    }

    navigator.geolocation.getCurrentPosition(position => {

        const userLat = position.coords.latitude;
        const userLon = position.coords.longitude;

        const distance = getDistance(userLat, userLon, businessLat, businessLon);

        if (distance <= maxDistance) {
            insideGeofence = true;
            startApp();
        } else {
            document.body.innerHTML = `
            <div style="text-align:center;margin-top:100px;font-family:Arial">
            <h1>Access Restricted</h1>
            <p>You must be within 50 metres of the training centre to use this system.</p>
            </div>`;
        }

    }, () => {

        document.body.innerHTML = `
        <div style="text-align:center;margin-top:100px;font-family:Arial">
        <h1>Location Access Required</h1>
        <p>Please enable location services to sign in.</p>
        </div>`;

    });
}


// ======================
// ORIGINAL APP CODE
// ======================

const scriptURL = "https://script.google.com/macros/s/AKfycbz5TxiBYfa3l2akddWkdExcKIXQZqZXD5a1bB6ByPbGMreLV1ZQWyQbWoHG9T8Xek9Z/exec";

const signInButton = document.querySelector(".signin");
const signOutButton = document.querySelector(".signout");

let buttonsLocked = false;

function lockButtons() {
    signInButton.disabled = true;
    signOutButton.disabled = true;
    buttonsLocked = true;
}

function unlockButtons() {
    signInButton.disabled = false;
    signOutButton.disabled = false;
    buttonsLocked = false;
}

async function signIn() {

    if (!insideGeofence) {
        alert("You must be within 50m of the building to sign in.");
        return;
    }

    if (buttonsLocked) return;

    lockButtons();

    const name = document.getElementById("name").value.trim();
    const telephone = document.getElementById("telephone").value.trim();
    const company = document.getElementById("company").value.trim();
    const vehicle = document.getElementById("vehicle").value.trim();
    const reason = document.getElementById("person").value.trim();

    if (!name || !telephone || !reason) {
        alert("Please complete required fields.");
        unlockButtons();
        return;
    }

    try {

        await fetch(scriptURL, {
            method: "POST",
            body: JSON.stringify({ action: "signIn", name, telephone, company, vehicle, reason })
        });

        document.getElementById("message").innerText = "Signed in successfully!";
        clearFields();
        loadCurrentVisitors();
        showModal();

    } catch (error) {

        alert("Error signing in. Please try again.");
        console.error(error);

    } finally {

        unlockButtons();

    }
}

async function signOut() {

    if (!insideGeofence) {
        alert("You must be within 50m of the building to sign out.");
        return;
    }

    if (buttonsLocked) return;

    lockButtons();

    const name = document.getElementById("name").value.trim();

    if (!name) {
        alert("Enter your full name.");
        unlockButtons();
        return;
    }

    try {

        await fetch(scriptURL, {
            method: "POST",
            body: JSON.stringify({ action: "signOut", name })
        });

        document.getElementById("message").innerText = "Signed out successfully!";
        clearFields();
        loadCurrentVisitors();

    } catch (error) {

        alert("Error signing out. Please try again.");
        console.error(error);

    } finally {

        unlockButtons();

    }
}

function clearFields() {
    document.querySelectorAll("input").forEach(i => i.value = "");
}

async function loadCurrentVisitors() {

    try {

        const response = await fetch(scriptURL);
        const data = await response.json();

        const list = document.getElementById("currentList");

        list.innerHTML = "";

        data.forEach(visitor => {

            const li = document.createElement("li");
            li.textContent = visitor;
            list.appendChild(li);

        });

    } catch (error) {

        console.log("Error loading visitor list");

    }
}

function showModal() {
    document.getElementById("popupModal").style.display = "block";
}

function closeModal() {
    document.getElementById("popupModal").style.display = "none";
}

window.onclick = function(event) {

    const modal = document.getElementById("popupModal");

    if (event.target == modal) modal.style.display = "none";

}


// ======================
// START APP AFTER GEOFENCE
// ======================

function startApp() {

    loadCurrentVisitors();
    setInterval(loadCurrentVisitors, 30000);

}

window.onload = checkGeofence;

</script>
